name: hooklove
description: Comparte dibujos en tiempo real con tu pareja.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_database: ^11.3.4
  firebase_messaging: ^15.2.4
  google_sign_in: ^6.3.0

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  go_router: ^14.8.1

  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  lottie: ^3.3.1

  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  connectivity_plus: ^6.1.4
  vibration: ^2.0.1

  uuid: ^4.5.1
  intl: ^0.20.2
  equatable: ^2.0.7
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  freezed: ^3.1.0
  riverpod_generator: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/fonts/
